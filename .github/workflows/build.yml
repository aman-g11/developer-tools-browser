name: Remote Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Using Java 17 as it supports most modern Gradle versions
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Build Permissions
      run: chmod +x gradlew

    # This creates a dummy properties file to trick the build if keys are missing
    - name: Bypass Missing Properties
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        touch app/google-services.json || true

    # Clean the project cache first before trying to compile again
    - name: Clean and Build APK
      run: ./gradlew clean assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/*/*.apk
