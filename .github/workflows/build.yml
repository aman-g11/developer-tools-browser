name: Remote Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Build Permissions
      run: chmod +x gradlew

    - name: Reset Hardcoded Mac Path
      run: |
        echo "sdk.dir=$ANDROID_HOME" > local.properties
        touch app/google-services.json || true
        sed -i '/org.gradle.java.home/d' gradle.properties || true
        echo "org.gradle.java.home=$JAVA_HOME" >> gradle.properties

    - name: Clean and Build APK
      run: ./gradlew clean assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Finished-APK
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/*/*.apk
