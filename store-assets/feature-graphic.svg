<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g stroke="#4fc3f7" opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1024" y2="100"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="300" x2="1024" y2="300"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="800" y1="0" x2="800" y2="500"/>
  </g>

  <!-- Globe (left side, subtle) -->
  <g fill="none" stroke="#4fc3f7" opacity="0.12" transform="translate(280, 250)">
    <circle cx="0" cy="0" r="120" stroke-width="2.5"/>
    <line x1="-120" y1="0" x2="120" y2="0" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="42" ry="120" stroke-width="1.5"/>
    <path d="M -103 -60 Q 0 -80 103 -60" stroke-width="1.2"/>
    <path d="M -103 60 Q 0 80 103 60" stroke-width="1.2"/>
  </g>

  <!-- Code brackets (left side, over globe) -->
  <g filter="url(#glow)">
    <path d="M 240 200 L 188 250 L 240 300"
          fill="none" stroke="#4fc3f7" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 320 200 L 372 250 L 320 300"
          fill="none" stroke="#4fc3f7" stroke-width="16"
          stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="296" y1="194" x2="264" y2="306"
          stroke="#81d4fa" stroke-width="13" stroke-linecap="round"/>
  </g>

  <!-- App name text -->
  <text x="460" y="228" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#e0e0e0">Developer Tools</text>
  <text x="460" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="#4fc3f7">Browser</text>

  <!-- Tagline -->
  <text x="460" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#888888">Chrome DevTools on your phone. No laptop required.</text>

  <!-- By line -->
  <text x="460" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555555">by Unix Shells</text>
</svg>
